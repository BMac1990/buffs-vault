.header-bg::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(200,168,75,0.025) 2px,rgba(200,168,75,0.025) 4px);z-index:1}
.header-inner{position:relative;z-index:2}
.bison-icon{font-size:34px;margin-bottom:6px;display:block;filter:drop-shadow(0 2px 8px rgba(212,175,55,0.3))}
.header h1{font-size:28px;font-weight:900;color:#d4af37;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 2px 16px rgba(212,175,55,0.45);line-height:1.1;margin-bottom:3px}
.subtitle{font-size:10px;color:#806010;letter-spacing:.25em;text-transform:uppercase;margin-bottom:14px}

/* ── COUNTDOWN ──────────────────────────────────────────────── */
.countdown-box{background:rgba(0,0,0,.55);border:1px solid #2a1e00;border-radius:12px;padding:10px 16px;margin:0 auto;max-width:300px;backdrop-filter:blur(4px)}
.countdown-label{font-size:9px;color:#a07820;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.countdown-digits{display:flex;justify-content:center;gap:6px}
.cd-unit{text-align:center;min-width:46px}
.cd-num{font-size:34px;font-weight:900;font-family:monospace;color:#f0e090;line-height:1;text-shadow:0 0 24px rgba(212,175,55,0.55)}
.cd-lbl{font-size:8px;color:#705010;text-transform:uppercase;letter-spacing:.12em;margin-top:3px}

/* ── RETIRED NUMBERS ────────────────────────────────────────── */
.retired-bar{background:#060400;border-bottom:1px solid #1e1600;padding:10px 14px}
.retired-bar-title{font-size:8px;color:#806010;letter-spacing:.3em;text-transform:uppercase;text-align:center;margin-bottom:8px}
.retired-numbers{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.retired-card{background:linear-gradient(135deg,#0e0b00,#080600);border:1px solid #2e2000;border-radius:8px;padding:6px 10px;text-align:center;min-width:68px}
.retired-num{font-size:17px;font-weight:900;color:#d4af37;font-family:monospace;line-height:1}
.retired-name{font-size:9px;color:#d0c060;margin-top:2px;white-space:nowrap}

/* ── YEAR PILLS ─────────────────────────────────────────────── */
.year-pills{background:#0a0800;border-bottom:1px solid #201800;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:none}
.year-pills::-webkit-scrollbar{display:none}
.year-pills-inner{display:flex;white-space:nowrap;padding-right:16px}
.year-pill{display:inline-block;background:transparent;border:1px solid #221800;color:#806010;padding:4px 10px;border-radius:12px;font-size:10px;margin-right:4px;cursor:pointer;white-space:nowrap;transition:background .15s}
.year-pill.active{background:#c8a030;color:#000;border-color:#d4af37;font-weight:700}

/* ── SEASON BANNER ──────────────────────────────────────────── */
.season-banner{background:linear-gradient(180deg,#0c0900,#060400);border-bottom:1px solid #181200;padding:14px}
.season-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.season-year{font-size:32px;font-weight:900;color:#d4af37;font-family:monospace;line-height:1}
.season-coach{font-size:11px;color:#906820;margin-top:3px}
.season-stats{display:flex;align-items:center;gap:10px}
.stat-num{font-size:24px;font-weight:900;line-height:1}
.stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.divider{width:1px;height:30px;background:#221800}
.win-bar-wrap{margin-top:8px}
.win-bar{height:4px;background:#0a0800;border-radius:2px;overflow:hidden;margin-bottom:3px}
.win-bar-fill{height:100%;background:linear-gradient(90deg,#1a7030,#3adf70);border-radius:2px}
.win-pct{font-size:9px;color:#806010;text-align:right}
.bowl-badge{display:inline-block;background:#160828;color:#c070ff;font-size:9px;padding:3px 8px;border-radius:8px;margin-top:5px;border:1px solid #301850;letter-spacing:.02em}
.ranking-badge{display:inline-block;background:#120e00;color:#c8a030;font-size:9px;padding:3px 8px;border-radius:8px;margin-top:5px;margin-left:4px;border:1px solid #2e2400}

/* ── TABS ────────────────────────────────────────────────────── */
.tabs{background:#060400;border-bottom:1px solid #0e0a00;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:none;padding-right:12px}
.tabs::-webkit-scrollbar{display:none}
.tabs+.tabs{border-top:1px solid #0e0a00;background:rgba(200,160,48,.03)}
.tab-btn{background:transparent;border:none;color:#906820;padding:12px 14px;font-size:12px;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;letter-spacing:.01em;transition:color .15s}
.tab-btn.active{color:#d4af37;border-bottom:2px solid #d4af37;font-weight:700}
.tab-btn:hover{color:#c8a030}

/* ── CONTENT AREA ───────────────────────────────────────────── */
.content{padding-bottom:50px}

/* ── GAME CARDS ─────────────────────────────────────────────── */
.game-card{display:flex;gap:10px;align-items:flex-start;background:#080600;border:1px solid #141000;border-radius:8px;padding:10px 12px;margin:0 10px 5px}
.game-card.win{border-left:3px solid #226030}
.game-card.loss{border-left:3px solid #602020}
.game-card.pending{border-left:3px solid #483000}
.result-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:1px}
.game-info{flex:1;min-width:0}
.game-top{display:flex;justify-content:space-between;align-items:flex-start}
.game-opp{font-size:13px;font-weight:700;color:#ede0b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:185px}
.game-score{font-size:14px;font-weight:900;font-family:monospace;flex-shrink:0}
.game-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;align-items:center}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.tag-date{color:#806010;background:#0a0800}
.tag-home{color:#38b060;background:#060e08}
.tag-away{color:#b04020;background:#120800}
.tag-neutral{color:#806010;background:#0a0800}
.tag-bowl{color:#b070ff;background:#160828}
.key-play{font-size:10px;color:#705010;font-style:italic;margin-top:5px;line-height:1.5;border-top:1px solid #140e00;padding-top:5px}

/* ── DATE RANGE ─────────────────────────────────────────────── */
.dr-box{background:#080600;border:1px solid #1e1600;border-radius:10px;padding:12px;margin:8px 10px}
.dr-inputs{display:flex;gap:6px;align-items:flex-end;margin-bottom:8px}
.dr-input-group{flex:1}
.dr-label{font-size:9px;color:#c8a030;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.dr-input{width:100%;background:#040300;border:1px solid #1e1600;color:#f0e090;padding:7px 9px;border-radius:7px;font-size:12px}
.dr-reset{background:#180e00;border:1px solid #1e1600;color:#a08020;padding:7px 10px;border-radius:7px;font-size:11px;cursor:pointer;white-space:nowrap}
.dr-presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.preset-btn{background:#080600;border:1px solid #1e1600;color:#806010;padding:4px 10px;border-radius:14px;font-size:10px;cursor:pointer;white-space:nowrap}
.preset-btn.active{background:#c8a030;color:#000;border-color:#d4af37;font-weight:700}
.preset-lbl{font-size:10px;color:#503808;white-space:nowrap;padding-top:5px}
.dr-summary{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#080600;border-bottom:1px solid #0e0a00}
.dr-games-title{padding:8px 12px 4px;font-size:10px;color:#806010}

/* ── BADGES ─────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.badge.W{background:#1a3a20;color:#40d870}
.badge.L{background:#3a1010;color:#e03030}
.badge.T{background:#2a2800;color:#c0c020}

/* ── SHARED CARD STYLES ─────────────────────────────────────── */
.cu-card{background:linear-gradient(135deg,#0a0800,#060500);border:1px solid #1e1600;border-radius:10px;padding:12px;margin-bottom:8px}
.cu-card-title{font-size:13px;font-weight:700;color:#f0e090;margin-bottom:4px}
.cu-card-sub{font-size:10px;color:#806010;margin-bottom:6px}
.cu-card-note{font-size:10px;color:#706010;font-style:italic;line-height:1.5}
.cu-section-label{font-size:9px;color:#a07818;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;padding:0 2px}
.cu-pill{display:inline-block;padding:4px 10px;border-radius:14px;font-size:10px;cursor:pointer;border:1px solid #1e1600;background:transparent;color:#806010;white-space:nowrap}
.cu-pill.active{background:#c8a030;color:#000;border-color:#d4af37;font-weight:700}

/* ── MISC ────────────────────────────────────────────────────── */
input[type=date]{color-scheme:dark}
.opp-chip{background:#080600;border:1px solid #1e1600;border-radius:8px;padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin:0 4px 4px 0}
.hof-card{background:linear-gradient(135deg,#0a0800,#060500);border:1px solid #1e1600;border-radius:9px;padding:10px 12px;margin-bottom:6px}
.nfl-card{background:linear-gradient(135deg,#0a0800,#060500);border:1px solid #141000;border-radius:9px;padding:10px 12px;margin-bottom:6px}
.split-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;margin-right:3px}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.25}}

/* ── WEBSITE NAV ────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:#060400;border-bottom:1px solid #221800;display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.topbar-brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;color:#d4af37;letter-spacing:.08em;text-transform:uppercase}
.topbar-brand .bison{font-size:18px}
.home-btn{background:transparent;border:1px solid #2a2000;border-radius:8px;width:38px;height:34px;color:#c8a030;font-size:17px;cursor:pointer;margin-right:6px;display:flex;align-items:center;justify-content:center}
.hamburger{background:transparent;border:1px solid #2a2000;border-radius:8px;width:38px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.hamburger span{display:block;width:18px;height:2px;background:#c8a030;border-radius:1px}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(2px)}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:78%;max-width:300px;background:#070500;border-left:1px solid #2a2000;z-index:100;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,.5)}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid #1e1600}
.sidebar-title{font-size:13px;font-weight:900;color:#d4af37;letter-spacing:.1em;text-transform:uppercase}
.sidebar-close{background:transparent;border:1px solid #2a2000;border-radius:6px;color:#a08020;width:30px;height:30px;font-size:16px;cursor:pointer}
.sidebar-section{padding:10px 14px 4px;font-size:9px;color:#806010;letter-spacing:.2em;text-transform:uppercase;border-top:1px solid #120e00;margin-top:4px}
.sidebar-section:first-of-type{border-top:none;margin-top:0}
.sidebar-link{display:block;width:100%;text-align:left;background:transparent;border:none;color:#c8a84b;padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #100c00}
.sidebar-link.active{color:#d4af37;font-weight:700;background:rgba(212,175,55,.06)}

/* ── PRINT BUTTON ───────────────────────────────────────────── */
.print-btn{background:transparent;border:1px solid #2a2000;border-radius:8px;color:#a08020;width:38px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;margin-right:6px}
.print-btn:hover{border-color:#c8a030;color:#d4af37}

/* ── PRINT STYLES ───────────────────────────────────────────── */
@media print{
  body{background:#fff!important;color:#000!important;max-width:100%!important}
  .header,.retired-bar,.topbar,.print-btn,.hamburger,.sidebar,.sidebar-overlay{display:none!important}
  /* hide the live banner + championship banner (first two children of #app before topbar) */
  #app>div:not(.content):not(.print-title){display:none!important}
  .content{padding:0!important}
  .content *{
    color:#000!important;
    background:transparent!important;
    border-color:#999!important;
    text-shadow:none!important;
    box-shadow:none!important;
  }
  .content [style*="background:linear-gradient"],
  .content [style*="background-image"]{background:none!important;background-image:none!important}
  a{color:#000!important;text-decoration:underline}
  button{display:none!important}
  input,select{display:none!important}
  .content > div:first-child{margin-top:0!important}
  @page{margin:0.6in}
}

/* ── HERO ANIMATIONS ─────────────────────────────────────────── */
@keyframes heroBgIn{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
@keyframes heroFadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroFadeIn{from{opacity:0}to{opacity:1}}
@keyframes heroBtnPulse{0%,100%{box-shadow:0 4px 24px rgba(212,175,55,.4)}50%{box-shadow:0 4px 36px rgba(212,175,55,.7)}}
@keyframes scrollDrop{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}

.hero-bg{animation:heroBgIn 1.4s cubic-bezier(.22,1,.36,1) forwards}
.hero-scanlines{animation:heroFadeIn 1.8s ease forwards}
.hero-vignette{animation:heroFadeIn 1.8s ease forwards}
.hero-eyebrow{animation:heroFadeUp .7s .5s cubic-bezier(.22,1,.36,1) both}
.hero-title{animation:heroFadeUp .7s .7s cubic-bezier(.22,1,.36,1) both}
.hero-tagline{animation:heroFadeUp .7s .9s cubic-bezier(.22,1,.36,1) both}
.hero-btn{animation:heroFadeUp .7s 1.1s cubic-bezier(.22,1,.36,1) both, heroBtnPulse 2.5s 1.8s ease-in-out infinite}
.hero-scroll{animation:scrollDrop .6s 1.5s both}

/* ── HERO REDESIGN ───────────────────────────────────────────── */
@keyframes heroParticle{0%{transform:translateY(0) scale(1);opacity:.6}100%{transform:translateY(-120px) scale(0);opacity:0}}
@keyframes heroStatIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroPulseGold{0%,100%{text-shadow:0 0 20px rgba(212,175,55,.3)}50%{text-shadow:0 0 60px rgba(212,175,55,.8),0 0 100px rgba(212,175,55,.4)}}
@keyframes heroLineGrow{from{width:0}to{width:60px}}
@keyframes heroBtnShine{0%{background-position:200% center}100%{background-position:-200% center}}

.hero-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:#d4af37;animation:heroParticle 3s ease-in infinite;opacity:0}
.hero-stats{display:flex;justify-content:center;gap:0;margin:20px 0 28px;position:relative;z-index:3}
.hero-stat{text-align:center;padding:0 16px;border-right:1px solid rgba(212,175,55,.2)}
.hero-stat:last-child{border-right:none}
.hero-stat-num{font-size:24px;font-weight:900;color:#d4af37;line-height:1;animation:heroStatIn .6s both}
.hero-stat-lbl{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:3px}
.hero-divider{width:0;height:1px;background:linear-gradient(90deg,transparent,#d4af37,transparent);margin:0 auto 20px;animation:heroLineGrow 1s 1s both}
.hero-title{font-size:52px;font-weight:900;color:#fff;line-height:.95;letter-spacing:-.02em;text-shadow:0 2px 40px rgba(0,0,0,.9);animation:heroFadeUp .7s .7s cubic-bezier(.22,1,.36,1) both,heroPulseGold 3s 2s ease-in-out infinite}
.hero-title span{color:#d4af37;display:block;font-size:58px}
.hero-btn{background:linear-gradient(135deg,#d4af37 0%,#f0d060 50%,#d4af37 100%);background-size:200% auto;color:#000;font-size:14px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;padding:16px 40px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 4px 32px rgba(212,175,55,.5),0 0 0 1px rgba(212,175,55,.3);animation:heroFadeUp .7s 1.1s cubic-bezier(.22,1,.36,1) both,heroBtnShine 3s 2s linear infinite,heroBtnPulse 2.5s 1.8s ease-in-out infinite}
.hero-eyebrow{font-size:11px;color:rgba(212,175,55,.8);letter-spacing:.5em;text-transform:uppercase;margin-bottom:20px;animation:heroFadeUp .7s .5s cubic-bezier(.22,1,.36,1) both}

@media(min-width:768px){.hamburger{display:none!important}.nav-overlay,.sidebar{display:none!important}.topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:100}#desktop-layout{display:flex;padding-top:56px;min-height:100vh}#desktop-nav{width:200px;min-width:200px;background:#040200;border-right:1px solid #2a2000;position:fixed;top:56px;bottom:0;overflow-y:auto;padding:10px 0}.desktop-nav-section{padding:10px 14px 3px;font-size:9px;color:#806010;letter-spacing:.15em;text-transform:uppercase}.desktop-nav-item{display:block;width:100%;padding:8px 18px;font-size:12px;color:#c8a030;background:transparent;border:none;border-left:3px solid transparent;text-align:left;cursor:pointer;font-family:inherit}.desktop-nav-item:hover{background:#0a0600;color:#f0d060}#desktop-content{margin-left:200px;flex:1;padding:20px}.header{display:none!important}body{overflow:auto}}
@media(max-width:767px){#desktop-nav{display:none!important}#desktop-content{margin-left:0!important;padding:0!important}}

function parseGames(yr){

  if(!raw) return [];
  return raw.map(function(g){
    return {date:g[0],opp:g[1],r:g[2],s:g[3],home:g[4]===1?true:g[4]===0?false:null,bowl:g[4]==="b",note:g[5]||null};
  });
}

function gameCardHTML(g,showYear){
  var isW=g.r==="W",isL=g.r==="L",isT=g.r==="T",isPend=!g.r;
  var borderL=isW?"#226030":isL?"#602020":isPend?"#483000":"#1e1600";
  var badgeBg=isW?"#1a3a20":isL?"#3a1010":isT?"#2a2800":"#181000";
  var badgeColor=isW?"#40d870":isL?"#e03030":isT?"#c0c020":"#606060";
  var locBg=g.bowl?"#160828":g.home===true?"#060e08":g.home===false?"#120800":"#0a0800";
  var locColor=g.bowl?"#b070ff":g.home===true?"#38b060":g.home===false?"#b04020":"#806010";
  var locLabel=g.bowl?"BOWL":g.home===true?"HOME":g.home===false?"AWAY":"NEUT";
  var scoreColor=isW?"#e8d880":isL?"#e05050":isT?"#c8b840":"#504010";
  var yrLabel=showYear&&(g.year||g.season)?"<span style='font-size:9px;color:#a07820;margin-right:5px;font-family:monospace'>"+(g.year||g.season)+"</span>":"";
  var noteText=g.note?g.note.split("|")[0]:"";
  return "<div style='display:flex;align-items:center;background:#080600;border:1px solid #141000;border-left:3px solid "+borderL+";border-radius:8px;padding:9px 10px 9px 11px;margin:0 10px 5px;gap:8px'>"
    +"<div style='flex:1;min-width:0'>"
      +"<div style='display:flex;align-items:center;gap:5px;flex-wrap:wrap'>"
        +yrLabel
        +"<span style='font-size:13px;font-weight:700;color:#ede0b0'>"+g.opp+"</span>"
        +"<span style='font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:"+locBg+";color:"+locColor+"'>"+locLabel+"</span>"
      +"</div>"
      +(noteText?"<div style='font-size:10px;color:#605010;font-style:italic;margin-top:4px;line-height:1.4'>"+noteText+"</div>":"")
    +"</div>"
    +(g.s?"<div style='font-size:13px;font-weight:900;font-family:monospace;color:"+scoreColor+";flex-shrink:0;margin-right:4px'>"+g.s+"</div>":"")
    +"<div style='width:26px;height:26px;border-radius:5px;background:"+badgeBg+";display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:"+badgeColor+";flex-shrink:0'>"+(isPend?"?":g.r)+"</div>"
    +(g.date?"<div style='font-size:9px;color:#503808;text-align:right;flex-shrink:0;min-width:30px;line-height:1.4'>"+g.date.replace(/ /g,"<br>")+"</div>":"")
  +"</div>";
}


function buildOpponents(){
  var series={};
  Object.keys(RAW).forEach(function(yr){
    var games=parseGames(parseInt(yr));
    games.forEach(function(g){
      var n=g.opp.replace(/^at /,"").replace(/^No\.\s*\d+\s*/,"").trim();
      if(!series[n]) series[n]={w:0,l:0,t:0,games:[]};
      if(g.r==="W") series[n].w++;
      else if(g.r==="L") series[n].l++;
      else if(g.r==="T") series[n].t++;
      series[n].games.push({yr:parseInt(yr),date:g.date,r:g.r,s:g.s,home:g.home,bowl:g.bowl});
    });
  });
  return series;
}

// ── LIVE SCORE AUTO-FETCHER ──────────────────────────────────
var liveScoreInterval = null;

function fetchLiveScore(){
  fetch('https://site.api.espn.com/apis/site/v2/sports/football/college-football/scoreboard?groups=80&limit=100')
    .then(function(r){return r.json();})
    .then(function(data){
      var events = data.events||[];
      var cuGame = null;
      for(var i=0;i<events.length;i++){
        var evt=events[i];
        var comps=evt.competitions||[];
        for(var j=0;j<comps.length;j++){
          var comp=comps[j];
          var teams=comp.competitors||[];
          for(var k=0;k<teams.length;k++){
            if(teams[k].team&&teams[k].team.abbreviation==='COLO'){
              cuGame={event:evt,comp:comp,teams:teams};
              break;
            }
          }
          if(cuGame) break;
        }
        if(cuGame) break;
      }
      if(cuGame){
        var comp=cuGame.comp;
        var teams=cuGame.teams;
        var cuTeam=teams.find(function(t){return t.team.abbreviation==='COLO';});
        var oppTeam=teams.find(function(t){return t.team.abbreviation!=='COLO';});
        var status=comp.status||{};
        var stype=status.type||{};
        var inProgress=stype.state==='in';
        var finished=stype.state==='post';
        var cuScore=parseInt(cuTeam&&cuTeam.score||0);
        var oppScore=parseInt(oppTeam&&oppTeam.score||0);
        var quarter=status.period?'Q'+status.period:'Pre';
        var clock=status.displayClock||'0:00';
        var oppName=(oppTeam&&oppTeam.team&&oppTeam.team.displayName)||'Opponent';
        var cuHome=cuTeam&&cuTeam.homeAway==='home';

        // Get scoring plays
        var plays=[];
        var scoringPlays=comp.scoringPlays||[];
        for(var s=0;s<scoringPlays.length;s++){
          var sp=scoringPlays[s];
          plays.push({
            time:'Q'+(sp.period&&sp.period.number||'?')+' '+sp.clock.displayValue,
            desc:sp.text||sp.type&&sp.type.text||'Scoring play',
            score:(sp.awayScore!==undefined&&cuHome?(sp.homeScore+'-'+sp.awayScore):(sp.awayScore+'-'+sp.homeScore))
          });
        }

        LIVE_GAME.active=inProgress;
        LIVE_GAME.cu=cuScore;
        LIVE_GAME.opp_score=oppScore;
        LIVE_GAME.opp=oppName;
        LIVE_GAME.home=cuHome;
        LIVE_GAME.quarter=finished?'Final':(inProgress?('Q'+status.period):stype.shortDetail||'Pre');
        LIVE_GAME.clock=finished?'':(clock);
        LIVE_GAME.note=finished?('Final: CU '+(cuScore>oppScore?'wins':'loses')+' '+cuScore+'-'+oppScore):(inProgress?'':'Next: '+oppName);
        state.gameDayPlays=plays;

        if(state.tab==='GameDay') render();
      }
    })
    .catch(function(e){console.log('Score fetch error:',e);});
}

function startLiveFetch(){
  fetchLiveScore();
  if(liveScoreInterval) clearInterval(liveScoreInterval);
  liveScoreInterval=setInterval(fetchLiveScore,30000);
}

// Start fetching immediately and check schedule to decide frequency
(function(){
  var now=new Date();
  var month=now.getMonth()+1;
  var day=now.getDay();
  // CU season runs Sep-Dec
  if(month>=8&&month<=12){
    startLiveFetch();
    // Check every 30s on Saturdays + Thursday opener
    if(day===6||day===4){
      if(liveScoreInterval) clearInterval(liveScoreInterval);
      liveScoreInterval=setInterval(fetchLiveScore,15000);
    }
  }
})();

    function doAsk(q){
      q=(q||"").trim();
      if(!q||state.askLoading) return;
      state.askHistory=(state.askHistory||[]).concat([{role:"user",content:q}]);
      state.askLoading=true;
      renderChat();

      // Use Claude API with web search
      var ANTHROPIC_KEY = window.CU_API_KEY || "";
      if(!ANTHROPIC_KEY){
        state.askLoading=false;
        state.askShowKeyInput=true;
        render();
        return;
      }

      fetch("https://corsproxy.io/?url=https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":ANTHROPIC_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1024,
          system:"You are the CU Buffs Vault AI — an expert on Colorado Buffaloes football. You have deep knowledge of CU football history from 1890 to present including all players, coaches, seasons, records, bowl games, rivalries, and traditions. Answer questions accurately and enthusiastically. Keep answers concise and mobile-friendly. Use bullet points for lists. Always be accurate. If asked about very recent events you don't know, say so honestly.",
          messages:[{role:"user",content:q}]
        })
      })
      .then(function(r){return r.json();})
      .then(function(data){
        var text = "";
        if(data.error) text = "API Error: " + data.error.type + " — " + data.error.message;
        if(data.content){
          data.content.forEach(function(block){
            if(block.type==="text") text += block.text;
          });
        }
        if(!text) text = "No response. Raw: " + JSON.stringify(data).slice(0,200);
        state.askHistory=state.askHistory.concat([{role:"assistant",content:text}]);
        state.askLoading=false;
        renderChat();
      })
      .catch(function(err){
        state.askHistory=state.askHistory.concat([{role:"assistant",content:"Error: "+err.message+" — "+err.toString()}]);
        state.askLoading=false;
        renderChat();
      });
    }

      var tw=tg.filter(function(g){return g.r==="W";}).length;

    var maxWins=Math.max.apply(null,trendWins)||12;
    var chartH=200, chartW=320, padL=28, padB=24, padT=10, padR=8;
    var innerW=chartW-padL-padR, innerH=(chartH-padB-padT)*0.72;
    var n=trendYears.length;
    var barW=Math.max(2,Math.floor(innerW/n)-1);

    // Build SVG bar chart
    var bars="", labels="", gridlines="";

    // Gridlines at 0, 3, 6, 9, 12
    [0,3,6,9,12].forEach(function(gv){
      var gy=padT+innerH-(gv/maxWins*innerH);
      gridlines+="<line x1='"+padL+"' y1='"+gy+"' x2='"+(padL+innerW)+"' y2='"+gy+"' stroke='#1a1400' stroke-width='1'/>";
      gridlines+="<text x='"+(padL-3)+"' y='"+(gy+4)+"' fill='#604010' font-size='8' text-anchor='end'>"+gv+"</text>";
    });

    // Year labels every 10 years
    trendYears.forEach(function(yr,i){
      var x=padL+i*(barW+1);
      var wh=trendWins[i]/maxWins*innerH;
      var lh=trendLosses[i]/maxWins*innerH;
      var wy=padT+innerH-wh;

      // Era colors
      var isChamp=(yr===1990);
      var isGreat=(trendWins[i]>=10);
      var isBad=(trendWins[i]<=2);
      var wColor=isChamp?"#d4af37":isGreat?"#4adf80":isBad?"#f04040":"#2a7040";

      bars+="<rect x='"+x+"' y='"+wy+"' width='"+barW+"' height='"+wh+"' fill='"+wColor+"' opacity='0.85'/>";
      bars+="<rect x='"+x+"' y='"+(padT+innerH)+"' width='"+barW+"' height='"+Math.max(1,lh)+"' fill='#4a1010' opacity='0.6'/>";

      if(yr%10===0){
        labels+="<text x='"+(x+barW/2)+"' y='"+(padT+innerH+padB-2)+"' fill='#604010' font-size='7' text-anchor='middle'>"+(yr)+"</text>";
      }
    });

    var svg="<svg viewBox='0 0 "+chartW+" "+chartH+"' width='100%' style='overflow:hidden;border-radius:6px'>"
      +"<rect width='"+chartW+"' height='"+chartH+"' fill='#050400'/>"
      +gridlines+bars+labels
      +"<line x1='"+padL+"' y1='"+padT+"' x2='"+padL+"' y2='"+(padT+innerH)+"' stroke='#2a2000' stroke-width='1'/>"
      +"<line x1='"+padL+"' y1='"+(padT+innerH)+"' x2='"+(padL+innerW)+"' y2='"+(padT+innerH)+"' stroke='#2a2000' stroke-width='1'/>"

    // Summary stats
    var totalW=trendWins.reduce(function(a,b){return a+b;},0);
    var totalL=trendLosses.reduce(function(a,b){return a+b;},0);
    var bestWin=Math.max.apply(null,trendWins);
    var bestYr=trendYears[trendWins.indexOf(bestWin)];
